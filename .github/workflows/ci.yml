name: CI Gate

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run linting
        run: npm run lint

      - name: Run Next.js production build
        run: npm run build

      - name: Run Jest unit & integration tests
        run: npm test

      - name: Install Playwright Chromium Browser
        run: npx playwright install --with-deps chromium

      - name: Run Playwright E2E and accessibility tests
        run: npx playwright test
        env:
          NEXT_PUBLIC_SAAS_URL: "https://app.prambanandigital.web.id"
          NEXT_PUBLIC_API_URL: "http://localhost:8080"
          NEXT_PUBLIC_SUPABASE_URL: "https://mock-project.supabase.co"
          NEXT_PUBLIC_SUPABASE_ANON_KEY: "mock-supabase-key"
          NEXT_PUBLIC_SANITY_PROJECT_ID: "mock-sanity-id"
          NEXT_PUBLIC_SANITY_DATASET: "production"
          NEXT_PUBLIC_SANITY_API_VERSION: "2024-03-08"
          SANITY_API_READ_TOKEN: "mock-sanity-read-token"
          OPENROUTER_API_KEY: "mock-openrouter-key"
          TELEGRAM_BOT_TOKEN: "mock-telegram-token"
          TELEGRAM_CHAT_ID: "mock-chat-id"
          CRON_SECRET: "mock-cron-secret"
